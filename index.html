<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PC Reset Kit</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="logo">
🖥️
</div>


<h1>PC RESET KIT</h1>


<p>
Tudo que seu computador precisa depois de uma formatação.
</p>




<!-- ESCOLHA WINDOWS -->

<div id="telaWindows">


<h2>
Qual Windows você instalou?
</h2>


<button onclick="selecionarWindows('Windows 10')">
Windows 10
</button>


<button onclick="selecionarWindows('Windows 11')">
Windows 11
</button>


</div>






<!-- ESCOLHA ARQUITETURA -->

<div id="telaArquitetura" style="display:none;">


<h2>
Qual arquitetura?
</h2>


<button onclick="selecionarArquitetura('32 Bits')">
32 Bits (x86)
</button>


<button onclick="selecionarArquitetura('64 Bits')">
64 Bits (x64)
</button>



<br>


<button onclick="voltarWindows()" class="voltar">
← Voltar
</button>



</div>







<!-- PROGRAMAS -->

<div id="resultado" style="display:none;">


<h2>
Escolha os programas
</h2>



<div id="config"></div>

<input 
id="buscaApp"
placeholder="🔎 Buscar aplicativo..."
onkeyup="buscarAplicativo()">

<div id="listaProgramas"></div>




<button onclick="voltarArquitetura()" class="voltar">
← Voltar
</button>



<button onclick="gerarPacote()">

CRIAR PACOTE DE INSTALAÇÃO

</button>



</div>





</div>


<script src="script.js"></script>


</body>

</html>
