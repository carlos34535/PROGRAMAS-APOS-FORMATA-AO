<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PC Reset Kit</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="logo">
🖥️
</div>


<h1>PC RESET KIT</h1>


<p>
Tudo que seu computador precisa depois de uma formatação.
</p>



<!-- TELA WINDOWS -->

<div id="telaWindows">


<h2>
Qual Windows você instalou?
</h2>


<button onclick="selecionarWindows('Windows 10')">
Windows 10
</button>


<button onclick="selecionarWindows('Windows 11')">
Windows 11
</button>


</div>





<!-- TELA ARQUITETURA -->


<div id="telaArquitetura" style="display:none;">


<h2>
Qual arquitetura do sistema?
</h2>


<button onclick="selecionarArquitetura('32 Bits')">
32 Bits (x86)
</button>


<button onclick="selecionarArquitetura('64 Bits')">
64 Bits (x64)
</button>


</div>






<!-- RESULTADO -->


<div id="resultado" style="display:none;">


<h2>
Seu pacote está pronto
</h2>


<div id="config"></div>



<button onclick="gerarPacote()">
GERAR PACOTE DE INSTALAÇÃO
</button>



</div>




</div>



<script src="script.js"></script>


</body>


</html>
